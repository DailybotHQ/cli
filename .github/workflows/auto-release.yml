name: Auto Release

# When a PR is merged into main, decide whether the changes warrant a release
# and, if so, bump the version + create the v* tag. The tag push then triggers
# `.github/workflows/release.yml` which fans out to PyPI, the Linux binary,
# the GitHub Release, and the Homebrew tap.
#
# Bump level is decided by python-semantic-release from conventional-commit
# prefixes since the last tag:
#   - feat:       -> minor bump
#   - fix:, perf: -> patch bump
#   - BREAKING CHANGE: in body, or feat!:/fix!: -> major bump
#   - chore/docs/refactor/style/test/ci/build -> no release
#
# Configuration lives in pyproject.toml under [tool.semantic_release].
#
# OPT-IN ESCAPE HATCH — the `[skip release]` marker:
#
# A `[skip release]` token anywhere in the body of the head commit on `main`
# (typically the squash-merge commit GitHub creates when a PR is merged) will
# short-circuit this workflow: PSR is never invoked, no tag is created, and
# `release.yml` is not dispatched. The default behaviour for every other PR is
# unchanged — a release is always cut, even for docs-only or chore-only PRs
# (because of `default_bump_level = 2` in pyproject.toml).
#
# WHEN TO USE IT — narrow, single, vetted use case:
#
#   * Syncing the in-repo copy of the Dailybot agent skill pack at
#     `.agents/skills/dailybot/` to a newly published `DailybotHQ/agent-skill`
#     release. The skill pack pins a `dailybot-cli >= X.Y.Z` floor; if the
#     dogfood-sync PR triggered an auto-release here, the CLI version would
#     advance past that floor, the skill pack would immediately go stale, and
#     we would loop forever (sync skill → bump CLI → resync skill → bump
#     CLI → …). The marker breaks the loop.
#
# Any other use of `[skip release]` is considered a bug. If a doc fix, CI
# tweak, or refactor genuinely should not produce a release, the answer is
# almost always "let it produce a PATCH" — that PATCH is the source of truth
# that the change shipped. See AGENTS.md Rule 15 and
# docs/RELEASE_AND_DISTRIBUTION.md for the full policy.
#
# THE MARKER IS NEVER INJECTED AUTOMATICALLY. A human (or an agent acting on
# explicit human request) must type it into the squash-commit body in the
# GitHub merge dialog, or pass it via `gh pr merge --body "..."`.

on:
  pull_request:
    types: [closed]
    branches: [main]
  # Manual trigger for emergency cuts (e.g. CI was down on the PR merge)
  workflow_dispatch: {}

concurrency:
  # Shared lock with `sync-installer-checksums.yml`: both workflows mutate
  # `main` (PSR pushes a chore(release) commit + tag here; the sync workflow
  # pushes a chore(installer) commit). If they ran in parallel — which happens
  # when a PR touches install.sh / install.ps1 — the second-to-push hits
  #     [LOCAL SHA] X != Y [UPSTREAM SHA]. Upstream branch has changed!
  # and the run aborts. Putting both under the same `main-write` group serializes
  # them: GitHub queues the second invocation until the first finishes, then it
  # checks out the now-up-to-date main and proceeds normally.
  group: main-write
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    # Only run when the PR was actually merged (not just closed)
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main with full history
        uses: actions/checkout@v6
        with:
          ref: main
          # PSR needs the full history to inspect commits since the last tag
          fetch-depth: 0
          # PAT with `Contents: write` that is allowed to bypass branch protection
          # on `main` (cannot use the default GITHUB_TOKEN if main is protected).
          token: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
          persist-credentials: true

      - name: Detect [skip release] marker on head commit
        # Opt-in escape hatch. See header comment for the full policy. The
        # match is anchored to the **head commit of main after the merge**
        # (i.e. the squash commit GitHub created from the PR), so the marker
        # has to be typed into the squash-commit body in the merge dialog —
        # individual commits inside the PR branch cannot trigger it.
        #
        # The pattern is intentionally literal `[skip release]` (no regex
        # flexibility): exact text, square brackets included, case-sensitive.
        # Using `grep -F` to avoid surprises from regex metachars inside the
        # commit body.
        id: skip_check
        run: |
          HEAD_SUBJECT="$(git log -1 --format=%s)"
          HEAD_BODY="$(git log -1 --format=%B)"
          if printf '%s' "$HEAD_BODY" | grep -qF '[skip release]'; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "## Auto Release Summary" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⏭️  **Release skipped on author request.**" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "The head commit on \`main\` contains the \`[skip release]\` marker, so:" >> "$GITHUB_STEP_SUMMARY"
            echo "- python-semantic-release was **not** invoked" >> "$GITHUB_STEP_SUMMARY"
            echo "- no new \`v*\` tag was created" >> "$GITHUB_STEP_SUMMARY"
            echo "- \`release.yml\` was **not** dispatched (no PyPI / binary / Homebrew publish)" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Commit: \`$HEAD_SUBJECT\`" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "If this was a mistake, manually dispatch a release with:" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
            echo "gh workflow run auto-release.yml --ref main" >> "$GITHUB_STEP_SUMMARY"
            echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
            echo "::notice title=Release skipped::Head commit on main has [skip release] marker — auto-release was skipped on author request. Subject: $HEAD_SUBJECT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "No [skip release] marker on head commit — proceeding with normal release flow."
          fi

      - name: Set up Python
        if: steps.skip_check.outputs.skip != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Configure git identity
        if: steps.skip_check.outputs.skip != 'true'
        # Use the PR author's GitHub identity for the bump commit so it shows
        # in `git log` as authored by the human who triggered the release,
        # not by an opaque bot. Falls back to ${{ github.actor }} for
        # workflow_dispatch runs (where there is no PR).
        #
        # NOTE: this changes the *commit author*, not the *pusher*. The push
        # itself is still authenticated with AUTOMATION_GITHUB_TOKEN — that
        # is what determines whether the tag-push event fires release.yml.
        # When the token is a bot/PAT that GitHub treats as automated, the
        # tag push does not trigger workflows; in that case use
        # `gh workflow run release.yml --ref v<X.Y.Z>` (workflow_dispatch).
        env:
          PR_AUTHOR_LOGIN: ${{ github.event.pull_request.user.login || github.actor }}
          PR_AUTHOR_ID:    ${{ github.event.pull_request.user.id || github.actor_id }}
        run: |
          git config user.name  "${PR_AUTHOR_LOGIN}"
          git config user.email "${PR_AUTHOR_ID}+${PR_AUTHOR_LOGIN}@users.noreply.github.com"

      - name: Install python-semantic-release
        if: steps.skip_check.outputs.skip != 'true'
        run: pip install "python-semantic-release>=10,<11"

      - name: Capture latest tag (before)
        if: steps.skip_check.outputs.skip != 'true'
        # Used to detect whether semantic-release actually created a new tag
        # in the next step (so we know whether to fire release.yml).
        id: tag_before
        run: |
          LATEST="$(git tag --sort=-creatordate | head -n1 || echo none)"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag before semantic-release: $LATEST"

      - name: Bump version, update changelog, tag, and push
        if: steps.skip_check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
        run: |
          # `semantic-release version` does the bump + commit + tag.
          # `--push` pushes both the bump commit and the new v* tag to origin.
          # `--changelog` regenerates CHANGELOG.md as part of the bump commit.
          # If there are no releasable commits since the last tag, this exits 0
          # without doing anything (and the rest of the workflow is a no-op).
          # `--strict` is a boolean flag in python-semantic-release 10+ (it took
          # `=false` in v9). Omitted here = non-strict, which is what we want:
          # if the resolver finds nothing to release, exit 0 instead of failing.
          semantic-release version --push --changelog --commit --tag

      - name: Capture latest tag (after) and detect new release
        if: steps.skip_check.outputs.skip != 'true'
        id: tag_after
        run: |
          LATEST="$(git tag --sort=-creatordate | head -n1 || echo none)"
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          if [ "$LATEST" != "${{ steps.tag_before.outputs.tag }}" ]; then
            echo "released=true" >> "$GITHUB_OUTPUT"
            echo "✅ semantic-release created new tag: $LATEST"
          else
            echo "released=false" >> "$GITHUB_OUTPUT"
            echo "ℹ️  No release this run (no qualifying commits since ${{ steps.tag_before.outputs.tag }})"
          fi

      - name: Trigger release.yml for the new tag
        # GitHub does not always fire the `push: tags: v*` trigger on
        # release.yml when the tag is pushed by a bot/PAT/GITHUB_TOKEN — its
        # documented anti-recursion safeguard. To avoid silent stuck-tag
        # incidents, we always dispatch release.yml explicitly here.
        # `workflow_dispatch` is the one trigger type that GitHub guarantees
        # WILL fire, regardless of which token initiated it. The result is a
        # deterministic auto-release → publish chain that does not depend on
        # how AUTOMATION_GITHUB_TOKEN happens to be configured.
        if: steps.tag_after.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag_after.outputs.tag }}"
          echo "Dispatching release.yml against $TAG ..."
          gh workflow run release.yml \
            --ref "$TAG" \
            --repo "${{ github.repository }}"
          echo "Watch: https://github.com/${{ github.repository }}/actions/workflows/release.yml"

      - name: Summarize result
        # Skipped when the `[skip release]` marker fired: that step already
        # wrote its own dedicated summary block, and the `tag_before` /
        # `tag_after` outputs this step relies on never ran.
        if: always() && steps.skip_check.outputs.skip != 'true'
        run: |
          echo "## Auto Release Summary" >> "$GITHUB_STEP_SUMMARY"
          LATEST="$(git tag --sort=-creatordate | head -n1 || echo none)"
          if [ "$LATEST" != "${{ steps.tag_before.outputs.tag }}" ]; then
            echo "✅ Cut **\`$LATEST\`** from \`${{ steps.tag_before.outputs.tag }}\`." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "\`release.yml\` was dispatched against \`$LATEST\` and should now be publishing to PyPI / Linux binary / GitHub Release / Homebrew tap." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "ℹ️  No release this run. Latest tag remains \`$LATEST\`." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "This is normal for PRs that contain only \`chore:\`/\`docs:\`/\`refactor:\`/\`style:\`/\`test:\`/\`ci:\`/\`build:\` commits." >> "$GITHUB_STEP_SUMMARY"
          fi
