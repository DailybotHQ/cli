name: dailybotplatformlocal

services:
  clivscode:
    container_name: dailybot-cli
    init: true
    build:
      # Repo root as build context so the Dockerfile can COPY pyproject.toml,
      # requirements/, and any other repo file. .dockerignore at the root keeps
      # the context lean (no node_modules, no .git, no AI-CLI persistence dirs).
      context: ../..
      dockerfile: ./docker/local/cli/Dockerfile
    working_dir: /workspace
    command: sleep infinity
    environment:
      - DOCKER_DEV_ENV=vscode
    networks:
      - dailybot
    env_file:
      - cli/.env
    volumes:
      - ../..:/workspace
      # Persistent data volumes mounted only for dev-user (devcontainer runs as dev-user)
      - claude_data:/home/dev-user/.claude_data
      - codex_data:/home/dev-user/.codex_data
      - cursor_data:/home/dev-user/.cursor_data
      - dailybot_data:/home/dev-user/.dailybot_data
      - gh_data:/home/dev-user/.gh_data
      # Mount the whole host ~/.ssh as read-only; the entrypoint then copies
      # every id_* private key it finds (plus *.pub, config, known_hosts) into
      # the container's writable ~/.ssh. This is portable across team members
      # regardless of which key names they use locally.
      - ${HOME}/.ssh:/home/dev-user/.ssh_host:ro
      - ${HOME}/.gitconfig:/home/dev-user/.gitconfig:ro

volumes:
  claude_data: {}
  codex_data: {}
  cursor_data: {}        # Cursor CLI session/auth (symlinked to ~/.cursor)
  dailybot_data: {}      # Dailybot CLI config/auth (~/.config/dailybot, config_local, config_custom)
  gh_data: {}

networks:
  dailybot:
    name: dailybot-project-network
    external: true
